name: Copy polish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch copy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('app/page.tsx')
          s = p.read_text()
          s = s.replace('Cymatics-inspired sacred geometry', 'Live audio sacred geometry')
          s = s.replace('Speak, chant, or upload sound to generate cymatics-inspired sacred geometry.', 'Speak or chant into the microphone and watch the visual field react in real time.')
          s = s.replace('Sri Chakra Mode is a calibrated sacred-geometry interpretation, not a laboratory proof.', 'Sri Chakra Mode follows a stable Om-like chant and resolves the particles into a Sri Chakra-inspired form.')
          s = s.replace('Design principles', 'Signal engine')
          s = s.replace('Audio analysis and rendering run client-side through the Web Audio API and Canvas 2D.', 'The microphone signal directly drives the canvas through amplitude, frequency, harmonics, and energy bands.')
          s = s.replace('Final Render Mode aggregates audio features and keeps a deterministic visual on the canvas.', 'Final Render Mode captures the chant profile and holds the completed pattern on screen.')
          s = s.replace('Particle counts are reduced on smaller screens to keep mobile performance reasonable.', 'Particle density scales automatically across phones, tablets, and desktops.')
          s = s.replace('Om Cymatics Visualizer — symbolic cymatics-inspired visualization. Microphone access requires HTTPS in production.', 'Om Cymatics Visualizer — live browser-based sound geometry. Microphone access runs securely over HTTPS.')
          p.write_text(s)

          v = Path('components/VisualizerCanvas.tsx')
          s = v.read_text()
          s = s.replace('if (width < 520) return 720;\n  if (width < 920) return 1200;\n  return 1900;', 'if (width < 520) return 900;\n  if (width < 920) return 1400;\n  return 2400;')
          s = s.replace('const energySize = particle.size + features.rms * 6;', 'const energySize = particle.size + features.rms * 9 + features.harmonicRichness * 1.4;')
          s = s.replace("ctx.fillStyle = 'rgba(255, 226, 166, 0.74)';", "ctx.fillStyle = features.rms > 0.14 ? 'rgba(255, 232, 174, 0.88)' : 'rgba(196, 185, 255, 0.66)';")
          s = s.replace('const jitterRadius = chaos * (5 + activeFeatures.rms * 42);', 'const jitterRadius = chaos * (5 + activeFeatures.rms * 68 + activeFeatures.highEnergy * 22);')
          s = s.replace('const attraction = settled ? 0.12 : 0.045 + activeFeatures.stability * 0.04 + morphProgress * 0.06;', 'const attraction = settled ? 0.14 : 0.055 + activeFeatures.stability * 0.045 + morphProgress * 0.07 + activeFeatures.rms * 0.035;')
          s = s.replace('settled ? Math.max(0.22, morphProgress * 0.72) : morphProgress * 0.46', 'settled ? Math.max(0.30, morphProgress * 0.88) : morphProgress * 0.60')
          s = s.replace("{algorithmMode === 'sri-chakra' ? 'Sri Chakra symbolic mode' : 'Cymatics physics-inspired mode'}", "{isRecording ? 'Listening to live audio' : algorithmMode === 'sri-chakra' ? 'Sri Chakra Mode' : 'Cymatics Mode'}")
          v.write_text(s)

          wf = Path('.github/workflows/copy-polish.yml')
          if wf.exists(): wf.unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish audio reactive app experience" || echo "No changes"
          git push
